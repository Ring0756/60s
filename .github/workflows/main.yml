name: 油价查询推送
on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: 请求接口并推送
        run: |
          API_URL="https://www.mxnzp.com/api/oil/search?province=广东&app_id=rgihdrm0kslojqvm&app_secret=WnhrK251TWlUUThqaVFWbG5OeGQwdz09"
          RES=$(curl -s "$API_URL")
          p92=$(echo "$RES" | jq -r '.data.t92')
          p95=$(echo "$RES" | jq -r '.data.t95')
          p98=$(echo "$RES" | jq -r '.data.t98')
          p0=$(echo "$RES" | jq -r '.data.t0')
          time=$(echo "$RES" | jq -r '.data.updateTime')
          curl -s -X POST "${{ secrets.WEWORK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"msgtype":"text","text":{"content":"广东油价('"$time"')\n92#: '"$p92"'\n95#: '"$p95"'\n98#: '"$p98"'\n0#: '"$p0'"}}'
