name: 天气油价测试
on:
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      # 7天天气预报
      - name: 推送7天天气
        run: |
          weather=$(curl -s "https://60s.viki.moe/v2/weather?city=珠海")
          city=$(echo "$weather" | jq -r '.data.location.name')
          forecast=$(echo "$weather" | jq -r '.data.daily_forecast[] | "📅 " + .date + " " + .day_condition + " " + (.min_temperature|tostring) + "~" + (.max_temperature|tostring) + "℃"')
          curl -s -X POST "${{ secrets.WEWORK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"msgtype":"text","text":{"content":"🌤️ '"$city"' 7天天气预报\n\n'"$forecast"'"}}'

      # 珠海今日油价
      - name: 推送今日油价
        run: |
          oil=$(curl -s "https://60s.viki.moe/v2/oil?city=珠海")
          p92=$(echo "$oil" | jq -r '.data.items[]|select(.name=="92#汽油").price')
          p95=$(echo "$oil" | jq -r '.data.items[]|select(.name=="95#汽油").price')
          p98=$(echo "$oil" | jq -r '.data.items[]|select(.name=="98#汽油").price')
          p0=$(echo "$oil" | jq -r '.data.items[]|select(.name=="0#柴油").price')
          next=$(echo "$oil" | jq -r '.data.trend.description')
          curl -s -X POST "${{ secrets.WEWORK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"msgtype":"text","text":{"content":"⛽ 珠海今日油价\n92#: '"$p92"' 元/升\n95#: '"$p95"' 元/升\n98#: '"$p98"' 元/升\n0#: '"$p0"' 元/升\n\n'"$next"'"}}'
