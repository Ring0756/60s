name: 油价推送测试
on:
  workflow_dispatch:

jobs:
  push-oil-price:
    runs-on: ubuntu-latest
    steps:
      - name: 推送广东今日油价
        run: |
          oil=$(curl -s "https://60s.viki.moe/v2/fuel-price?region=广东")
          p92=$(echo "$oil" | jq -r '.data.price."92"')
          p95=$(echo "$oil" | jq -r '.data.price."95"')
          p98=$(echo "$oil" | jq -r '.data.price."98"')
          p0=$(echo "$oil" | jq -r '.data.price."0"')
          updated=$(echo "$oil" | jq -r '.data.updated')
          curl -s -X POST "${{ secrets.WEWORK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"msgtype":"text","text":{"content":"⛽ 广东今日油价（'"$updated"'）\n92#: '"$p92"' 元/升\n95#: '"$p95"' 元/升\n98#: '"$p98"' 元/升\n0#柴油: '"$p0"' 元/升"}}'
