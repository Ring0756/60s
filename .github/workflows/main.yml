name: 每日60s早报文字推送
on:
  schedule:
    - cron: '30 23 * * *'
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: 获取并发送早报文本
        run: |
          content=$(curl -s "https://60s.viki.moe/v2/60s?encoding=text")
          curl -X POST "${{ secrets.WEWORK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{
              "msgtype": "text",
              "text": {
                "content": "'"$content"'"
              }
            }'
