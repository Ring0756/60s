name: 每日60s早报推送到企业微信
on:
  schedule:
    - cron: "30 23 * * *"
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: 直接获取并推送
        run: |
          # 获取Markdown内容
          CONTENT=$(curl -s "https://60s-api.viki.moe/v2/60s?type=markdown")
          
          # 转义双引号，避免JSON格式错误
          ESCAPED_CONTENT=$(echo "$CONTENT" | sed 's/"/\\"/g')
          
          # 拼接标题（企业微信Markdown格式）
          FINAL_CONTENT="### 📰 每日60s早报\n$ESCAPED_CONTENT"
          
          # 发送到企业微信（纯单行curl命令，无任何缩进问题）
          curl -X POST "${{ secrets.WEWORK_WEBHOOK_URL }}" -H "Content-Type: application/json" -d "{\"msgtype\":\"markdown\",\"markdown\":{\"content\":\"$FINAL_CONTENT\"}}"
