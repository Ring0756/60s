name: 珠海天气+油价推送
on:
  workflow_dispatch:
  schedule:
    - cron: "30 23 * * *"

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: 推送数据
        run: |
          # 推送珠海7天天气预报
          curl -s -X POST "${{ secrets.WEWORK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"msgtype":"text","text":{"content":"☁️ 珠海7天天气预报\n'"$(curl -s 'https://60s.viki.moe/v2/weather?encoding=text&query=珠海&days=7')"'"}}'
          
          # 推送珠海汽油价格
          curl -s -X POST "${{ secrets.WEWORK_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"msgtype":"text","text":{"content":"⛽ 珠海汽油价格\n'"$(curl -s 'https://60s.viki.moe/v2/fuel-price?encoding=text&region=珠海')"'"}}'
